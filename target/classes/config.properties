# Configuration Properties for Notes App Automation Framework

# Browser Configuration (chrome, firefox, edge, chrome-headless)
browser=chrome

# Application Endpoints
ui.base.url=https://practice.expandtesting.com/notes/app
api.base.url=https://practice.expandtesting.com/notes/api

# Wait Timeouts (in seconds)
implicit.wait=10
explicit.wait=15

# UI / E2E Test User Credentials (used by UI and E2E scenarios)
ui.test.email=ansh@gmail.com
ui.test.password=12345678

# API Test User Credentials (dedicated user for API scenarios — isolated from UI user)
api.test.email=ansh_api@gmail.com
api.test.password=12345678

# Retry Configuration (SmartRetryAnalyzer — max retries for transient failures)
retry.max.count=2

# API Test Data
api.note.temp.category=Home
api.note.temp.title=Temp Note for Deletion
api.note.temp.description=To be deleted.
api.note.xss.title=<script>alert('xss')</script>
api.note.xss.category=Personal
api.note.xss.description=XSS Test payload
